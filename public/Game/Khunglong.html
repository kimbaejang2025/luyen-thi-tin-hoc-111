<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Khủng Long Hoạt Hình - Dino Run Acceleration</title>
    <style>
        :root {
            --bg-color: #e0f7fa; /* Màu nền trời ban ngày nhạt dễ chịu */
            --ground-color: #8d6e63; /* Màu đất đá */
            --text-color: #333;
            --cloud-color: #ffffff;
        }

        /* Chế độ ban đêm bí ẩn khi đạt điểm cao */
        .night-mode {
            --bg-color: #1a237e;
            --ground-color: #3e2723;
            --text-color: #ffffff;
            --cloud-color: #5c6bc0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Khung game tự động co giãn theo tỷ lệ màn hình chuẩn 8:3 */
        #game-container {
            position: relative;
            width: 95vw;
            max-width: 800px;
            aspect-ratio: 800 / 300;
            background-color: var(--bg-color);
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: background-color 0.8s;
            touch-action: none; /* Khóa cuộn trang và zoom màn hình trên điện thoại */
        }

        /* Bảng tính điểm */
        #score-board {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: clamp(11px, 2.5vw, 18px);
            font-weight: bold;
            color: var(--text-color);
            letter-spacing: 1px;
            z-index: 10;
        }

        #score-board span {
            color: #ff5722;
        }

        /* Mặt đất phẳng */
        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: var(--ground-color);
            border-top: 4px solid #4e342e;
            transition: background-color 0.8s;
        }

        /* Đám mây hoạt hình trôi */
        .cloud {
            position: absolute;
            top: 40px;
            background-color: var(--cloud-color);
            border-radius: 20px;
            opacity: 0.8;
            transition: background-color 0.8s;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background-color: var(--cloud-color);
            border-radius: 50%;
            transition: background-color 0.8s;
        }
        .cloud-1 { width: 60px; height: 20px; left: 25%; top: 50px; }
        .cloud-1::before { width: 30px; height: 30px; top: -15px; left: 10px; }
        .cloud-1::after { width: 25px; height: 25px; top: -10px; right: 10px; }

        .cloud-2 { width: 80px; height: 25px; left: 75%; top: 30px; }
        .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
        .cloud-2::after { width: 30px; height: 30px; top: -12px; right: 15px; }


        /* KHỦNG LONG HOẠT HÌNH (DINO) DỰNG BẰNG CSS-ART */
        #dino {
            position: absolute;
            bottom: 40px; 
            left: 50px;
            width: 44px;
            height: 48px;
            z-index: 5;
        }

        .dino-body {
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: #4caf50;
            border-radius: 8px;
            bottom: 12px;
            left: 4px;
            box-shadow: inset -4px -4px 0px #2e7d32;
        }
        .dino-head {
            position: absolute;
            width: 24px;
            height: 20px;
            background-color: #4caf50;
            top: -14px;
            right: -10px;
            border-radius: 6px;
            box-shadow: inset -2px 2px 0px #81c784;
        }
        .dino-eye {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: white;
            border-radius: 50%;
            top: 4px;
            right: 4px;
        }
        .dino-eye::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: black;
            border-radius: 50%;
            top: 1px;
            right: 1px;
        }
        .dino-tail {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #4caf50;
            left: -8px;
            bottom: 6px;
            border-radius: 4px;
            transform: rotate(-30deg);
        }

        .leg {
            position: absolute;
            width: 6px;
            height: 14px;
            background-color: #2e7d32;
            bottom: 0;
            border-radius: 3px;
        }
        .leg-left { left: 10px; }
        .leg-right { left: 24px; }

        .dino-walking .leg-left {
            animation: walk 0.2s infinite alternate;
        }
        .dino-walking .leg-right {
            animation: walk 0.2s infinite alternate-reverse;
        }

        @keyframes walk {
            0% { height: 14px; transform: translateY(0); }
            100% { height: 8px; transform: translateY(2px); }
        }

        .jump {
            animation: dinoJump 0.55s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes dinoJump {
            0% { bottom: 40px; }
            50% { bottom: 165px; } 
            100% { bottom: 40px; }
        }


        /* CHƯỚNG NGẠI VẬT XƯƠNG RỒNG (CACTUS) */
        .cactus {
            position: absolute;
            bottom: 40px;
            width: 25px;
            height: 45px;
            background-color: #ff9800; 
            border-radius: 6px;
            box-shadow: inset -3px -3px 0px #e65100;
        }
        .cactus::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 20px;
            background-color: #ff9800;
            left: -8px;
            top: 10px;
            border-radius: 4px 0 0 4px;
            border-bottom: 4px solid #e65100;
        }
        .cactus::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 16px;
            background-color: #ff9800;
            right: -8px;
            top: 5px;
            border-radius: 0 4px 4px 0;
            border-bottom: 4px solid #e65100;
        }


        /* MÀN HÌNH THÔNG BÁO / TRẠNG THÁI */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 20;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen h1 {
            font-size: clamp(20px, 5vw, 36px);
            color: #4caf50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .screen p {
            font-size: clamp(12px, 2.5vw, 16px);
        }

        button {
            padding: 10px 28px;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: bold;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #e65100;
        }

        .hint {
            margin-top: 15px;
            font-size: clamp(11px, 2vw, 14px);
            color: #bbb;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">SCORE: <span id="current-score">00000</span> | HI: <span id="high-score">00000</span></div>
        
        <div class="cloud cloud-1" id="cloud1"></div>
        <div class="cloud cloud-2" id="cloud2"></div>

        <div id="dino" class="dino-walking">
            <div class="dino-body">
                <div class="dino-head">
                    <div class="dino-eye"></div>
                </div>
                <div class="dino-tail"></div>
            </div>
            <div class="leg leg-left"></div>
            <div class="leg leg-right"></div>
        </div>

        <div id="ground"></div>

        <div id="start-screen" class="screen">
            <h1>DINO RUN ADVENTURE</h1>
            <button onclick="startGame()">Bắt đầu chơi</button>
            <div class="hint">
                <b>Trên PC:</b> Nhấn phím SPACE (CÁCH), MŨI TÊN LÊN hoặc Click chuột.<br>
                <b>Trên Phone:</b> Chạm ngón tay vào bất kỳ đâu trên màn hình để nhảy bơi!
            </div>
        </div>

        <div id="gameover-screen" class="screen" style="display: none;">
            <h1 style="color: #f44336;">GAME OVER</h1>
            <p>Bạn đã va vào cây xương rồng!</p>
            <button onclick="startGame()">Chơi lại ván mới</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const dino = document.getElementById('dino');
        const scoreElement = document.getElementById('current-score');
        const highScoreElement = document.getElementById('high-score');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');

        let isJumping = false;
        let isGameOver = true;
        let score = 0;
        let highScore = localStorage.getItem('dino_highscore') || 0;

        // CẤU HÌNH HỆ THỐNG GIA TỐC TĂNG TIẾN TỰ ĐỘNG
        const INITIAL_SPEED = 4.5; // Tốc độ khởi đầu chậm rãi để làm quen
        let gameSpeed = INITIAL_SPEED;
        let obstacles = [];
        let spawnTimer = 0;

        highScoreElement.innerText = String(highScore).padStart(5, '0');

        function startGame() {
            score = 0;
            gameSpeed = INITIAL_SPEED; 
            isGameOver = false;
            isJumping = false;
            spawnTimer = 0;
            
            obstacles.forEach(obs => obs.element.remove());
            obstacles = [];

            startScreen.style.display = 'none';
            gameoverScreen.style.display = 'none';
            container.classList.remove('night-mode'); 

            dino.classList.add('dino-walking');
            dino.style.bottom = '40px';

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (isGameOver) return;

            // 1. Điểm số tăng tỷ lệ thuận với tốc độ hiện tại (chạy nhanh ăn nhiều điểm hơn)
            score += (gameSpeed * 0.025);
            let displayScore = Math.floor(score);
            scoreElement.innerText = String(displayScore).padStart(5, '0');

            // Đổi màu môi trường dựa theo mốc điểm
            if (Math.floor(displayScore / 350) % 2 === 1) {
                container.classList.add('night-mode');
            } else {
                container.classList.remove('night-mode');
            }

            // --- THUẬT TOÁN TĂNG TỐC DỒN DẬP (ACCELERATION LOGIC) ---
            // Ban đầu gameSpeed tăng rất chậm, càng về sau gia tốc cộng vào mỗi khung hình càng lớn
            let accelerationFactor = 0.001 + (gameSpeed * 0.00015);
            gameSpeed += accelerationFactor;

            // Di chuyển mây nền
            moveClouds();

            // 2. Kiểm soát nhịp độ sinh Xương Rồng thông minh theo vận tốc
            spawnTimer++;
            // Tốc độ càng cao thì khoảng cách thời gian tối thiểu giữa các cây xương rồng càng thu ngắn lại
            let spawnCooldown = Math.max(30, 100 - Math.floor(gameSpeed * 5));
            if (spawnTimer > spawnCooldown) {
                if (Math.random() > 0.45) {
                    createCactus();
                    spawnTimer = 0; 
                }
            }

            // 3. Di chuyển chướng ngại vật & Tính toán va chạm
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.left -= gameSpeed; 
                obs.element.style.left = obs.left + 'px';

                if (obs.left < -40) {
                    obs.element.remove();
                    obstacles.splice(i, 1);
                    continue;
                }

                // Thuật toán kiểm tra va chạm bằng hộp giới hạn (AABB) có độ bo an toàn cao
                let dinoRect = dino.getBoundingClientRect();
                let obsRect = obs.element.getBoundingClientRect();

                if (
                    dinoRect.right - 6 > obsRect.left &&
                    dinoRect.left + 6 < obsRect.right &&
                    dinoRect.bottom - 4 > obsRect.top &&
                    dinoRect.top + 4 < obsRect.bottom
                ) {
                    triggerGameOver();
                    return;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        function createCactus() {
            const element = document.createElement('div');
            element.classList.add('cactus');
            
            // Chiều cao ngẫu nhiên tăng tính bất ngờ
            let height = Math.floor(Math.random() * 22) + 33; 
            element.style.height = height + 'px';
            
            // Xuất phát linh hoạt từ góc phải thực tế của màn hình chứa thiết bị
            let startLeft = container.clientWidth; 
            element.style.left = startLeft + 'px';
            
            container.appendChild(element);
            obstacles.push({ element: element, left: startLeft });
        }

        function moveClouds() {
            const c1 = document.getElementById('cloud1');
            const c2 = document.getElementById('cloud2');

            let maxBound = container.clientWidth;
            let c1Left = c1.offsetLeft - (gameSpeed * 0.15); 
            let c2Left = c2.offsetLeft - (gameSpeed * 0.12);

            if (c1Left < -80) c1Left = maxBound + 50;
            if (c2Left < -100) c2Left = maxBound + 50;

            c1.style.left = c1Left + 'px';
            c2.style.left = c2Left + 'px';
        }

        function jump() {
            if (isJumping || isGameOver) return;

            isJumping = true;
            dino.classList.remove('dino-walking'); 
            dino.classList.add('jump');

            // Thời gian bật nhảy được căn chỉnh khớp 550ms gọn gàng theo tốc độ cao ván đấu
            setTimeout(() => {
                dino.classList.remove('jump');
                if (!isGameOver) {
                    dino.classList.add('dino-walking'); 
                }
                isJumping = false;
            }, 550);
        }

        function triggerGameOver() {
            isGameOver = true;
            dino.classList.remove('dino-walking'); 

            let finalScore = Math.floor(score);
            if (finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem('dino_highscore', highScore);
                highScoreElement.innerText = String(highScore).padStart(5, '0');
            }

            gameoverScreen.style.display = 'flex';
        }

        // --- LẮNG NGHE TƯƠNG TÁC BÀN PHÍM (PC) ---
        window.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Up') {
                e.preventDefault(); 
                if (isGameOver && startScreen.style.display === 'none') {
                    startGame(); 
                } else {
                    jump();
                }
            }
        });

        // --- LẮNG NGHE TƯƠNG TÁC CHUỘT (PC) ---
        container.addEventListener('mousedown', function(e) {
            if (e.button === 0) {
                if (isGameOver && startScreen.style.display === 'none') {
                    startGame();
                } else {
                    jump();
                }
            }
        });

        // --- LẮNG NGHE TƯƠNG TÁC CẢM ỨNG (MOBILE) ---
        container.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Triệt tiêu độ trễ nhấp phản hồi của trình duyệt di động
            if (isGameOver) {
                if (startScreen.style.display === 'none') {
                    startGame();
                }
            } else {
                jump();
            }
        }, { passive: false });
    </script>
</body>
</html>
