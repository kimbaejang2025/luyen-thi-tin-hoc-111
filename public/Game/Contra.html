<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retro Contra 2D Clone</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        canvas {
            background: #000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            border: 4px solid #333;
            display: block;
            width: 95vw;
            max-width: 800px;
            height: auto;
            aspect-ratio: 800 / 450;
            touch-action: none;
        }
        #hud {
            width: 95vw;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: clamp(12px, 3vw, 20px);
            font-weight: bold;
            text-shadow: 2px 2px #000;
            pointer-events: none;
            margin-bottom: 5px;
            box-sizing: border-box;
        }
        #hud span { color: #ff3333; }
        #instructions {
            margin-top: 10px;
            color: #aaa;
            font-size: clamp(10px, 2vw, 14px);
            text-align: center;
            line-height: 1.5;
            pointer-events: none;
        }
        #instructions b { color: #00ffff; }

        /* HỆ THỐNG PHÍM ẢO CHO MOBILE */
        .mobile-controls {
            display: none; /* Mặc định ẩn trên máy tính */
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
            pointer-events: none;
        }

        /* Chỉ hiển thị phím ảo trên thiết bị màn hình cảm ứng */
        @media (pointer: coarse) {
            .mobile-controls {
                display: flex;
            }
            #instructions {
                display: none; /* Ẩn hướng dẫn bàn phím trên điện thoại */
            }
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
            pointer-events: auto;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .v-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Nút tròn to cho hành động Nhảy / Bắn */
        .action-buttons .v-btn {
            width: 65px;
            height: 65px;
            font-size: 22px;
            background: rgba(211, 47, 47, 0.4);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .v-btn:active {
            background: rgba(255, 255, 255, 0.6) !important;
            transform: scale(0.9);
        }

        /* Định vị các phím d-pad */
        #btnUp { grid-column: 2; grid-row: 1; }
        #btnLeft { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="hud">
        <div>SCORE: <span id="scoreText">00000</span></div>
        <div>WEAPON: <span id="weaponText" style="color:#00ff00;">NORMAL</span></div>
        <div>LIVES: <span id="livesText">❤❤❤</span></div>
    </div>
    
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    
    <div id="instructions">
        [Di chuyển]: <b>A/D hoặc Mũi tên</b> | [Nằm/Ngắm]: <b>W/S hoặc Lên/Xuống</b><br>
        [Bắn]: Giữ phím <b>J</b> | [Nhảy]: Phím <b>K</b> | [Thua trận]: Ấn <b>R</b> để hồi sinh
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <div class="v-btn" id="btnUp">↑</div>
            <div class="v-btn" id="btnLeft">←</div>
            <div class="v-btn" id="btnRight">→</div>
            <div class="v-btn" id="btnDown">↓</div>
        </div>
        <div class="action-buttons">
            <div class="v-btn" id="btnShoot" style="background: rgba(255, 152, 0, 0.5)">J</div>
            <div class="v-btn" id="btnJump">K</div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let score = 0;
let lives = 3;
let gameOver = false;
let gameTime = 0;

const GRAVITY = 0.5;
const FLOOR_Y = 380;
const camera = { x: 0 };

const platforms = [
    { x: 0, y: FLOOR_Y, w: 3000, h: 100 }, 
    { x: 250, y: 280, w: 180, h: 15 },
    { x: 500, y: 200, w: 200, h: 15 },
    { x: 800, y: 260, w: 250, h: 15 },
    { x: 1200, y: 220, w: 300, h: 15 },
    { x: 1600, y: 280, w: 200, h: 15 }
];

const player = {
    x: 100, y: 100, vx: 0, vy: 0,
    width: 30, height: 50,
    speed: 4, jumpForce: 11,
    grounded: false, facing: 1, 
    aimX: 1, aimY: 0,
    isCrouching: false, shootCooldown: 0,
    weaponType: 'NORMAL', invulnerable: 0
};

let bullets = [];
let enemies = [];
let enemyBullets = [];
let items = [];
let particles = [];

// Đối tượng quản lý chung cho cả phím vật lý (PC) và phím ảo (Mobile)
const keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// --- HÀM LIÊN KẾT PHÍM ẢO MOBILE VÀO HỆ THỐNG CỦA GAME ---
function bindMobileButton(elementId, keyCode) {
    const btn = document.getElementById(elementId);
    if (!btn) return;

    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        keys[keyCode] = true;
        // Nếu game over mà chạm vào màn hình/nút bất kỳ, hỗ trợ tự động reset ván mới
        if (gameOver) location.reload();
    }, { passive: false });

    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        keys[keyCode] = false;
    }, { passive: false });
}

// Map các phím ảo tương ứng với mã phím cơ bản của PC
bindMobileButton('btnUp', 'KeyW');
bindMobileButton('btnLeft', 'KeyA');
bindMobileButton('btnRight', 'KeyD');
bindMobileButton('btnDown', 'KeyS');
bindMobileButton('btnShoot', 'KeyJ');
bindMobileButton('btnJump', 'KeyK');

// Cho phép chạm vào vùng canvas khi Game Over để chơi lại nhanh
canvas.addEventListener('touchstart', function() {
    if (gameOver) location.reload();
});


function createExplosion(x, y, color = '#ff5500') {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 3 + 2,
            alpha: 1, color: color
        });
    }
}

function playerShoot() {
    if (player.shootCooldown > 0) return;
    
    let startX = player.x + (player.facing === 1 ? player.width : 0);
    let startY = player.y + (player.isCrouching ? player.height * 0.7 : player.height * 0.3);
    
    if (player.aimY === -1 && player.aimX === 0) {
        startX = player.x + player.width / 2;
        startY = player.y;
    }

    if (player.weaponType === 'NORMAL') {
        bullets.push({ x: startX, y: startY, vx: player.aimX * 8, vy: player.aimY * 8, size: 4, color: '#ffcc00' });
        player.shootCooldown = 12; 
    } else if (player.weaponType === 'SPREAD') {
        let angle = Math.atan2(player.aimY, player.aimX);
        let angles = [angle - 0.2, angle, angle + 0.2];
        
        angles.forEach(a => {
            bullets.push({
                x: startX, y: startY,
                vx: Math.cos(a) * 9, vy: Math.sin(a) * 9,
                size: 6, color: '#ff3300'
            });
        });
        player.shootCooldown = 18;
    }
}

function spawnEnemies() {
    if (gameTime % 100 === 0 && enemies.length < 5) {
        enemies.push({
            type: 'SOLDIER',
            x: camera.x + canvas.width + 50,
            y: FLOOR_Y - 50,
            vx: -2, vy: 0,
            width: 30, height: 50, hp: 1
        });
    }
    
    if (gameTime === 1) {
        enemies.push({ type: 'TURRET', x: 650, y: 220, width: 40, height: 40, shootCooldown: 60, hp: 3 });
        enemies.push({ type: 'TURRET', x: 1350, y: 170, width: 40, height: 40, shootCooldown: 80, hp: 3 });
    }
}

function checkAABB(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function update() {
    if (gameOver) {
        if (keys['KeyR']) location.reload();
        return;
    }

    gameTime++;
    if (player.invulnerable > 0) player.invulnerable--;
    if (player.shootCooldown > 0) player.shootCooldown--;

    player.isCrouching = false;
    player.aimX = player.facing;
    player.aimY = 0;

    if (keys['KeyA'] || keys['ArrowLeft']) {
        player.vx = -player.speed;
        player.facing = -1;
    } else if (keys['KeyD'] || keys['ArrowRight']) {
        player.vx = player.speed;
        player.facing = 1;
    } else {
        player.vx = 0;
    }

    if (keys['KeyW'] || keys['ArrowUp']) {
        player.aimY = -1;
        if (!keys['KeyA'] && !keys['KeyD'] && !keys['ArrowLeft'] && !keys['ArrowRight']) {
            player.aimX = 0; 
        }
    } else if (keys['KeyS'] || keys['ArrowDown']) {
        if (player.grounded) {
            player.isCrouching = true;
            player.vx = 0; 
        }
        player.aimY = 1;
    }

    if (keys['KeyK']) {
        if (player.grounded) {
            player.vy = -player.jumpForce;
            player.grounded = false;
        }
    }

    if (keys['KeyJ']) {
        playerShoot();
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    if (player.x < camera.x) player.x = camera.x;

    player.grounded = false;
    platforms.forEach(p => {
        if (player.vx >= 0 && player.vy >= 0 &&
            player.x + player.width > p.x && player.x < p.x + p.w &&
            player.y + player.height >= p.y && player.y + player.height - player.vy <= p.y + 10) {
            player.y = p.y - player.height;
            player.vy = 0;
            player.grounded = true;
        }
    });

    if (player.y > canvas.height + 100) {
        playerDie();
    }

    if (player.x > camera.x + canvas.width / 2) {
        camera.x = player.x - canvas.width / 2;
    }

    bullets.forEach((b, index) => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < camera.x || b.x > camera.x + canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(index, 1);
        }
    });

    spawnEnemies();
    enemies.forEach((e, eIdx) => {
        if (e.type === 'SOLDIER') {
            e.vy += GRAVITY; e.x += e.vx; e.y += e.vy;
            
            platforms.forEach(p => {
                if (e.x + e.width > p.x && e.x < p.x + p.w && e.y + e.height >= p.y && e.y + e.height - e.vy <= p.y + 10) {
                    e.y = p.y - e.height; e.vy = 0;
                }
            });
        } 
        else if (e.type === 'TURRET') {
            e.shootCooldown--;
            if (e.shootCooldown <= 0 && e.x > camera.x && e.x < camera.x + canvas.width) {
                let angle = Math.atan2((player.y + 20) - e.y, player.x - e.x);
                enemyBullets.push({
                    x: e.x + e.width/2, y: e.y + e.height/2,
                    vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4
                });
                e.shootCooldown = 90 + Math.random() * 60;
            }
        }

        bullets.forEach((b, bIdx) => {
            if (checkAABB({x: b.x, y: b.y, width: b.size, height: b.size}, e)) {
                bullets.splice(bIdx, 1);
                e.hp--;
                createExplosion(e.x + e.width/2, e.y + e.height/2, '#ffffff');

                if (e.hp <= 0) {
                    createExplosion(e.x + e.width/2, e.y + e.height/2, '#ff3300');
                    if (e.type === 'TURRET' || Math.random() < 0.2) {
                        items.push({ x: e.x, y: e.y - 10, width: 25, height: 20, vy: 0 });
                    }
                    enemies.splice(eIdx, 1);
                    score += e.type === 'TURRET' ? 500 : 100;
                    document.getElementById('scoreText').innerText = String(score).padStart(5, '0');
                }
            }
        });

        if (checkAABB(player, e) && player.invulnerable === 0) {
            playerDie();
        }

        if (e.x < camera.x - 100) enemies.splice(eIdx, 1);
    });

    enemyBullets.forEach((eb, ebIdx) => {
        eb.x += eb.vx; eb.y += eb.vy;

        if (checkAABB({x: eb.x, y: eb.y, width: 6, height: 6}, player) && player.invulnerable === 0) {
            enemyBullets.splice(ebIdx, 1);
            playerDie();
        }

        if (eb.x < camera.x || eb.x > camera.x + canvas.width) {
            enemyBullets.splice(ebIdx, 1);
        }
    });

    items.forEach((item, idx) => {
        item.vy += GRAVITY; item.y += item.vy;
        
        platforms.forEach(p => {
            if (item.x + item.width > p.x && item.x < p.x + p.w && item.y + item.height >= p.y && item.y + item.height - item.vy <= p.y + 10) {
                item.y = p.y - item.height; item.vy = 0;
            }
        });

        if (checkAABB(player, item)) {
            player.weaponType = 'SPREAD';
            document.getElementById('weaponText').innerText = 'SPREAD (S)';
            document.getElementById('weaponText').style.color = '#ff3300';
            items.splice(idx, 1);
        }
    });

    particles.forEach((p, idx) => {
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
        if (p.alpha <= 0) particles.splice(idx, 1);
    });
}

function playerDie() {
    lives--;
    createExplosion(player.x + player.width/2, player.y + player.height/2, '#ff0000');
    if (lives < 0) {
        gameOver = true;
        document.getElementById('livesText').innerText = 'GAME OVER';
    } else {
        document.getElementById('livesText').innerText = '❤'.repeat(lives);
        player.x = camera.x + 50; player.y = 50;
        player.vx = 0; player.vy = 0;
        player.weaponType = 'NORMAL';
        document.getElementById('weaponText').innerText = 'NORMAL';
        document.getElementById('weaponText').style.color = '#00ff00';
        player.invulnerable = 90; 
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, 0);

    platforms.forEach(p => {
        ctx.fillStyle = p.y === FLOOR_Y ? '#0a5c0a' : '#8B5A2B'; 
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = '#222';
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    items.forEach(item => {
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(item.x, item.y, item.width, item.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('S', item.x + 7, item.y + 15);
    });

    enemies.forEach(e => {
        if (e.type === 'SOLDIER') {
            ctx.fillStyle = '#33ccff'; 
            ctx.fillRect(e.x, e.y, e.width, e.height);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(e.x + 5, e.y, e.width - 10, 10);
        } else if (e.type === 'TURRET') {
            ctx.fillStyle = '#444444'; 
            ctx.beginPath();
            ctx.arc(e.x + e.width/2, e.y + e.height/2, e.width/2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff3333';
            ctx.fillRect(e.x + e.width/2 - 5, e.y + e.height/2 - 5, 10, 10);
        }
    });

    enemyBullets.forEach(eb => {
        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill();
    });

    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
    });

    if (player.invulnerable === 0 || Math.floor(gameTime / 4) % 2 === 0) {
        ctx.fillStyle = '#ff5722'; 

        if (player.isCrouching) {
            ctx.fillRect(player.x, player.y + player.height - 20, player.height, 20);
            ctx.fillStyle = '#ffdbac'; 
            ctx.fillRect(player.x + (player.facing === 1 ? 30 : 0), player.y + player.height - 35, 15, 15);
        } else {
            ctx.fillRect(player.x, player.y + 20, player.width, 30);
            ctx.fillStyle = '#ffdbac'; 
            ctx.fillRect(player.x + 3, player.y, player.width - 6, 20); 
            
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(player.x, player.y + 4, player.width, 4);

            ctx.fillStyle = '#555';
            let gunW = 20, gunH = 6;
            let gunX = player.x + (player.facing === 1 ? player.width - 5 : -15);
            let gunY = player.y + 18;

            if (player.aimY === -1) { 
                ctx.save();
                ctx.translate(player.x + player.width/2, player.y + 15);
                ctx.rotate(player.facing === 1 ? -Math.PI/4 : -3*Math.PI/4);
                ctx.fillRect(0, -3, gunW, gunH);
                ctx.restore();
            } else { 
                ctx.fillRect(gunX, gunY, gunW, gunH);
            }
        }
    }

    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    });

    ctx.restore();

    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 32px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px "Courier New"';
        ctx.fillText('Ấn phím R hoặc Chạm màn hình để Tái Sinh', canvas.width / 2, canvas.height / 2 + 30);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
