<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird Phiên Bản Cải Tiến</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Khung chứa game tự động co giãn theo tỷ lệ dọc 3:4 chuẩn Flappy Bird */
        #game-container {
            position: relative;
            width: 92vw;
            max-width: 480px;
            aspect-ratio: 480 / 640;
            background: linear-gradient(to bottom, #38b6ff, #92d8ff);
            border: 4px solid #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            touch-action: none; /* Ngăn chặn cuộn trang/zoom nhầm trên điện thoại */
        }

        /* Giao diện điểm số */
        #score-board {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: clamp(24px, 6vw, 32px);
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0px #222;
            z-index: 10;
        }

        #star-currency {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: clamp(13px, 3vw, 20px);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0px #222;
            z-index: 10;
        }

        /* Thông báo hiệu ứng đặc biệt */
        #buff-announcement {
            position: absolute;
            top: 70px;
            width: 100%;
            text-align: center;
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: bold;
            color: #ff3366;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            display: none;
            z-index: 10;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Thành phố nền chuyển động phía sau */
        #background-city {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 200%;
            height: 100px;
            background-image: linear-gradient(transparent 70%, #7bc676 70%), 
                              repeating-linear-gradient(90deg, #62b1d0, #62b1d0 20px, transparent 20px, transparent 40px);
            opacity: 0.5;
        }

        /* Mặt đất */
        #ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 40px;
            background: repeating-linear-gradient(45deg, #ded895, #ded895 15px, #dfd373 15px, #dfd373 30px);
            border-top: 4px solid #543847;
            z-index: 4;
        }

        /* ĐỐI TƯỢNG CHIM (BIRD) TẠO BẰNG CSS-ART */
        #bird {
            position: absolute;
            width: 36px;
            height: 26px;
            left: 100px;
            top: 250px;
            z-index: 5;
            transition: transform 0.1s;
        }

        .skin-default {
            background-color: #f7d117; 
            border-radius: 14px;
            box-shadow: inset -3px -3px 0px #cda200;
        }
        .skin-ninja {
            background-color: #2b2b2b; 
            border-radius: 14px;
            box-shadow: inset -3px -3px 0px #111, 0 0 10px #ff3333;
        }
        .skin-fire {
            background-color: #ff4500; 
            border-radius: 14px;
            box-shadow: inset -3px -3px 0px #b33000, 0 0 15px #ffcc00;
        }

        .bird-eye {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
            top: 4px;
            right: 6px;
        }
        .bird-eye::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: black;
            border-radius: 50%;
            top: 2px;
            right: 1px;
        }
        .bird-beak {
            position: absolute;
            width: 12px;
            height: 10px;
            background-color: #f57c00;
            border-radius: 0 4px 4px 0;
            top: 8px;
            right: -10px;
        }
        .bird-wing {
            position: absolute;
            width: 14px;
            height: 10px;
            background-color: rgba(255,255,255,0.6);
            border-radius: 7px;
            top: 10px;
            left: 4px;
            transform-origin: left center;
        }
        .flapping {
            animation: flap 0.15s infinite alternate;
        }
        @keyframes flap {
            0% { transform: rotate(20deg); }
            100% { transform: rotate(-30deg); }
        }

        /* ỐNG NƯỚC (PIPE) */
        .pipe {
            position: absolute;
            width: 70px;
            background-color: #73c734;
            border: 4px solid #543847;
            box-sizing: border-box;
            box-shadow: inset -10px 0px 0px #5aa422;
            z-index: 3;
        }
        .pipe::after {
            content: '';
            position: absolute;
            width: 78px;
            height: 24px;
            background-color: #73c734;
            border: 4px solid #543847;
            left: -8px;
            box-shadow: inset -10px 0px 0px #5aa422;
        }
        .pipe-top {
            border-top: none;
            border-radius: 0 0 6px 6px;
        }
        .pipe-top::after { bottom: -4px; }
        .pipe-bottom {
            border-bottom: none;
            border-radius: 6px 6px 0 0;
        }
        .pipe-bottom::after { top: -4px; }

        /* VẬT PHẨM NGÔI SAO BẤT TỬ */
        .star-item {
            position: absolute;
            width: 25px;
            height: 25px;
            background-color: #ffd700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            z-index: 3;
            animation: spin 1s infinite linear;
            box-shadow: 0 0 10px #ffd700;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* CÁC MÀN HÌNH CHỨC NĂNG (SCREENS) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 20;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen h1 {
            font-size: clamp(20px, 6vw, 36px);
            color: #ffd700;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px #000;
        }

        .screen p { margin: 5px 0 20px 0; font-size: clamp(12px, 2.5vw, 16px); color: #ccc;}

        button {
            padding: 10px 30px;
            font-size: clamp(14px, 2.5vw, 18px);
            font-weight: bold;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            margin-bottom: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover { transform: scale(1.05); background-color: #45a049; }

        /* Khung Cửa Hàng Skin */
        .shop-title {
            font-size: clamp(14px, 2.8vw, 18px);
            color: #ffd700;
            font-weight: bold;
            margin-top: 5px;
            border-top: 1px dashed #555;
            width: 85%;
            text-align: center;
            padding-top: 10px;
        }
        .shop-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            width: 90%;
            justify-content: center;
            flex-wrap: wrap;
        }
        .shop-item {
            background-color: #222;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 8px 4px;
            width: 90px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        .shop-item:hover { border-color: #ffd700; background-color: #2d2d2d; }
        .shop-item.selected { border-color: #4caf50; background-color: #1b3a1e; }
        .shop-item.locked { opacity: 0.6; }
        
        .skin-preview {
            width: 30px;
            height: 22px;
            margin: 0 auto 6px auto;
            border-radius: 8px;
        }

        .shop-item small {
            font-size: 11px;
            display: block;
        }

        .shop-item span { font-size: 10px; font-weight: bold; display: block; margin-top: 4px;}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">0</div>
        <div id="star-currency">⭐ Có: <span id="total-score-txt">0</span></div>
        
        <div id="buff-announcement">🌟 CHẾ ĐỘ BẤT TỬ: KÍCH HOẠT! 🌟</div>

        <div id="background-city"></div>
        <div id="ground"></div>

        <div id="bird" class="skin-default">
            <div class="bird-eye"></div>
            <div class="bird-beak"></div>
            <div class="bird-wing flapping"></div>
        </div>

        <div id="menu-screen" class="screen">
            <h1>FLAPPY BIRD UPGRADE</h1>
            <p>Phiên Bản Cải Tiến Đặc Sắc</p>
            <button id="btn-start-game">Bắt đầu bay</button>

            <div class="shop-title">CỬA HÀNG SKIN CHIM</div>
            <div class="shop-container" id="shop-box">
                <div class="shop-item selected" id="shop-default" data-skin="default" data-price="0">
                    <div class="skin-preview" style="background-color: #f7d117;"></div>
                    <small>Mặc Định</small>
                    <span style="color: #4caf50;">ĐÃ CÓ</span>
                </div>
                <div class="shop-item locked" id="shop-ninja" data-skin="ninja" data-price="15">
                    <div class="skin-preview" style="background-color: #2b2b2b; box-shadow: 0 0 5px red;"></div>
                    <small>Ninja Đen</small>
                    <span id="price-ninja" style="color: #ffd700;">🎯 15đ</span>
                </div>
                <div class="shop-item locked" id="shop-fire" data-skin="fire" data-price="40">
                    <div class="skin-preview" style="background-color: #ff4500; box-shadow: 0 0 5px gold;"></div>
                    <small>Siêu Nhân</small>
                    <span id="price-fire" style="color: #ffd700;">🎯 40đ</span>
                </div>
            </div>
            <p style="font-size: 11px; color: #888; margin-top: 15px;"><b>PC:</b> Ấn SPACE hoặc Click chuột.<br><b>Phone:</b> Chạm màn hình để bay.</p>
        </div>

        <div id="gameover-screen" class="screen" style="display: none;">
            <h1 style="color: #f44336;">GAME OVER</h1>
            <p>Điểm trận này: <span id="match-score" style="color:#ffd700; font-weight:bold;">0</span></p>
            <button onclick="showMenu()">Quay lại Shop</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const bird = document.getElementById('bird');
        const scoreBoard = document.getElementById('score-board');
        const totalScoreTxt = document.getElementById('total-score-txt');
        const buffTxt = document.getElementById('buff-announcement');
        const menuScreen = document.getElementById('menu-screen');
        const gameoverScreen = document.getElementById('gameover-screen');

        let birdY = 250;
        let velocity = 0;
        const gravity = 0.4;
        const jumpForce = -7.5;

        let isGameRunning = false;
        let score = 0;
        let totalScore = parseInt(localStorage.getItem('fb_total_score')) || 0;
        let currentSkin = 'default';
        
        let unlockedSkins = JSON.parse(localStorage.getItem('fb_unlocked_skins')) || ['default'];

        let isInvincible = false;
        let invincibleTimer = null;

        let pipes = [];
        let stars = [];
        let gameInterval;
        let spawnTimer = 0;

        let gameSpeed = 3;

        totalScoreTxt.innerText = totalScore;
        updateShopUI();

        function updateShopUI() {
            unlockedSkins.forEach(skin => {
                const item = document.getElementById(`shop-${skin}`);
                if (item) {
                    item.classList.remove('locked');
                    const span = item.querySelector('span');
                    if (span && skin !== 'default') span.innerHTML = "<span style='color: #4caf50;'>ĐÃ MỞ</span>";
                }
            });
            document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`shop-${currentSkin}`).classList.add('selected');
        }

        function selectSkin(skinName, price) {
            if (unlockedSkins.includes(skinName)) {
                currentSkin = skinName;
                bird.className = `skin-${skinName}`;
                updateShopUI();
            } else {
                if (totalScore >= price) {
                    totalScore -= price;
                    localStorage.setItem('fb_total_score', totalScore);
                    totalScoreTxt.innerText = totalScore;
                    
                    unlockedSkins.push(skinName);
                    localStorage.setItem('fb_unlocked_skins', JSON.stringify(unlockedSkins));
                    
                    currentSkin = skinName;
                    bird.className = `skin-${skinName}`;
                    updateShopUI();
                } else {
                    alert("Bạn không đủ số điểm tích lũy! Hãy tiếp tục bay để kiếm thêm nhé.");
                }
            }
        }

        // Đăng ký sự kiện click trực tiếp cho các vật phẩm shop để chặn hiện tượng nhảy vỗ cánh ẩn
        document.getElementById('shop-box').addEventListener('click', function(e) {
            let item = e.target.closest('.shop-item');
            if (item) {
                // Triệt tiêu sự kiện lan truyền lên thẻ cha, không kích hoạt flap() hay startGame() ảo
                e.stopPropagation(); 
                let skin = item.getAttribute('data-skin');
                let price = parseInt(item.getAttribute('data-price'));
                selectSkin(skin, price);
            }
        });

        document.getElementById('shop-box').addEventListener('touchstart', function(e) {
            e.stopPropagation(); // Áp dụng chặn tương tự cho sự kiện chạm mobile
        }, { passive: true });

        // Gắn sự kiện riêng biệt cho nút bắt đầu game
        document.getElementById('btn-start-game').addEventListener('click', function(e) {
            e.stopPropagation();
            startGame();
        });
        document.getElementById('btn-start-game').addEventListener('touchstart', function(e) {
            e.stopPropagation();
            startGame();
        });

        function showMenu() {
            gameoverScreen.style.display = 'none';
            menuScreen.style.display = 'flex';
            updateShopUI();
        }

        function startGame() {
            menuScreen.style.display = 'none';
            gameoverScreen.style.display = 'none';
            
            birdY = 250;
            velocity = 0;
            score = 0;
            scoreBoard.innerText = "0";
            isGameRunning = true;
            
            isInvincible = false;
            buffTxt.style.display = 'none';
            bird.style.filter = 'none';
            clearTimeout(invincibleTimer);

            pipes.forEach(p => p.el.remove());
            stars.forEach(s => s.el.remove());
            pipes = [];
            stars = [];
            spawnTimer = 0;

            clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 1000 / 60);
        }

        function flap() {
            if (!isGameRunning) return;
            velocity = jumpForce;
        }

        // Sự kiện bàn phím (PC)
        window.addEventListener('keydown', (e) => { 
            if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'Up') flap(); 
        });

        // Sự kiện Click chuột trái (PC)
        container.addEventListener('mousedown', function(e) {
            if (e.button === 0 && isGameRunning) flap();
        });

        // Sự kiện Cảm ứng chạm (Mobile)
        container.addEventListener('touchstart', function(e) {
            if (isGameRunning) {
                e.preventDefault(); // Tránh trễ nhịp và click ảo song song trên di động
                flap();
            }
        }, { passive: false });


        function updateGame() {
            velocity += gravity;
            birdY += velocity;
            bird.style.top = birdY + 'px';

            let angle = Math.min(Math.max(-20, velocity * 4), 70);
            bird.style.transform = `rotate(${angle}deg)`;

            if (birdY > 574 || birdY < 0) { 
                triggerGameOver();
                return;
            }

            const bgCity = document.getElementById('background-city');
            const ground = document.getElementById('ground');
            bgCity.style.left = (bgCity.offsetLeft - 0.5) % 480 + 'px';
            ground.style.left = (ground.offsetLeft - gameSpeed) % 480 + 'px';

            spawnTimer++;
            if (spawnTimer >= 110) { 
                createPipePair();
                spawnTimer = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                let p = pipes[i];
                p.x -= gameSpeed;
                p.el.style.left = p.x + 'px';

                if (!p.passed && p.isTop && p.x + 70 < 100) { 
                    p.passed = true;
                    score++;
                    scoreBoard.innerText = score;
                }

                if (checkCollision(bird, p.el)) {
                    if (isInvincible) {
                        p.el.remove();
                        pipes.splice(i, 1);
                        continue;
                    } else {
                        triggerGameOver();
                        return;
                    }
                }

                if (p.x < -80) {
                    p.el.remove();
                    pipes.splice(i, 1);
                }
            }

            for (let i = stars.length - 1; i >= 0; i--) {
                let s = stars[i];
                s.x -= gameSpeed;
                s.el.style.left = s.x + 'px';

                if (checkCollision(bird, s.el)) {
                    s.el.remove();
                    stars.splice(i, 1);
                    activateInvincibleMode();
                    continue;
                }

                if (s.x < -40) {
                    s.el.remove();
                    stars.splice(i, 1);
                }
            }
        }

        function createPipePair() {
            const gap = 140; 
            const minHeight = 50;
            const maxHeight = 560 - gap - minHeight - 40; 
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            const bottomHeight = 560 - gap - topHeight;

            const pipeTop = document.createElement('div');
            pipeTop.classList.add('pipe', 'pipe-top');
            pipeTop.style.height = topHeight + 'px';
            pipeTop.style.top = '0px';
            pipeTop.style.left = '480px';
            container.appendChild(pipeTop);
            pipes.push({ el: pipeTop, x: 480, isTop: true, passed: false });

            const pipeBottom = document.createElement('div');
            pipeBottom.classList.add('pipe', 'pipe-bottom');
            pipeBottom.style.height = bottomHeight + 'px';
            pipeBottom.style.bottom = '40px';
            pipeBottom.style.left = '480px';
            container.appendChild(pipeBottom);
            pipes.push({ el: pipeBottom, x: 480, isTop: false, passed: false });

            if (Math.random() < 0.35) {
                const star = document.createElement('div');
                const starTop = topHeight + (gap / 2) - 12; 
                star.classList.add('star-item');
                star.style.top = starTop + 'px';
                star.style.left = '502px'; 
                container.appendChild(star);
                stars.push({ el: star, x: 502 });
            }
        }

        function activateInvincibleMode() {
            isInvincible = true;
            buffTxt.style.display = 'block';
            bird.style.filter = 'drop-shadow(0 0 8px #ffd700) invert(10%)'; 

            clearTimeout(invincibleTimer);
            invincibleTimer = setTimeout(() => {
                isInvincible = false;
                buffTxt.style.display = 'none';
                bird.style.filter = 'none';
            }, 5000);
        }

        function checkCollision(el1, el2) {
            const r1 = el1.getBoundingClientRect();
            const r2 = el2.getBoundingClientRect();
            
            return !(r1.right - 3 < r2.left || 
                     r1.left + 3 > r2.right || 
                     r1.bottom - 3 < r2.top || 
                     r1.top + 3 > r2.bottom);
        }

        function triggerGameOver() {
            isGameRunning = false;
            clearInterval(gameInterval);
            
            totalScore += score;
            localStorage.setItem('fb_total_score', totalScore);
            totalScoreTxt.innerText = totalScore;

            document.getElementById('match-score').innerText = score;
            gameoverScreen.style.display = 'flex';
        }
    </script>
</body>
</html>
